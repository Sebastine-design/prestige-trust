<!DOCTYPE html>
<html>
  <head>
    <title>Prestige Trust</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div class="container">
      <div class="login-card">

        <div class="logo">
          <i class="fas fa-landmark"></i>
        </div>

        <h1 class="bank-name">Prestige Trust</h1>
        <p class="tagline">Secure. Simple. Smart.</p>

        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="text" placeholder="Email Address" class="input-field">
        </div>

        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" placeholder="Password" class="input-field">
        </div>

        <button class="login-btn" onclick="login()">Log In</button>

        <p class="forgot">Forgot password?</p>

        <div class="divider">
          <span>or</span>
        </div>

        <p class="signup">Don't have an account? <span class="signup-link">Sign Up</span></p>

      </div>
    </div>
<script>
  function login() {
    const email = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;

    if (email === "admin@prestigetrust.com" && password === "prestige123") {
      window.location.href = "dashboard.html";
    } else {
      alert("Invalid email or password. Please try again!");
    }
  }
</script>
  </body>
</html>
