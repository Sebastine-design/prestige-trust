<!DOCTYPE html>
<html>
  <head>
    <title>Prestige Trust</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1a3c5e, #2e86c1);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .login-card {
        background: rgba(255,255,255,0.98);
        padding: 45px 40px;
        border-radius: 24px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 400px;
        text-align: center;
        animation: slideUp 0.5s ease;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .logo {
        background: linear-gradient(135deg, #1a3c5e, #2e86c1);
        width: 70px;
        height: 70px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 16px;
        box-shadow: 0 10px 20px rgba(26,60,94,0.3);
      }

      .logo i {
        color: white;
        font-size: 30px;
      }

      .bank-name {
        font-size: 24px;
        color: #1a3c5e;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }

      .tagline {
        color: #aaa;
        margin-bottom: 32px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .input-wrapper {
        position: relative;
        margin-bottom: 16px;
        text-align: left;
      }

      .input-label {
        font-size: 12px;
        color: #888;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
        display: block;
      }

      .input-icon {
        position: absolute;
        left: 14px;
        bottom: 14px;
        color: #aaa;
        font-size: 15px;
      }

      .input-field {
        width: 100%;
        padding: 14px 14px 14px 40px;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        transition: border 0.3s;
        background: #f8f9fa;
      }

      .input-field:focus {
        border-color: #2e86c1;
        background: white;
      }

      .forgot {
        text-align: right;
        margin-bottom: 20px;
        margin-top: -8px;
      }

      .forgot span {
        color: #2e86c1;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
      }

      .login-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #1a3c5e, #2e86c1);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 1px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 10px 20px rgba(26,60,94,0.3);
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(26,60,94,0.4);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 24px 0;
        color: #ccc;
        font-size: 13px;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e0e0e0;
      }

      .divider span {
        padding: 0 12px;
      }

      .biometric-btn {
        width: 100%;
        padding: 14px;
        background: white;
        color: #1a3c5e;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: border 0.3s;
        margin-bottom: 24px;
      }

      .biometric-btn:hover {
        border-color: #2e86c1;
        color: #2e86c1;
      }

      .signup {
        font-size: 13px;
        color: #888;
      }

      .signup-link {
        color: #1a3c5e;
        font-weight: 700;
        cursor: pointer;
      }

      .secure-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 20px;
        color: #aaa;
        font-size: 11px;
      }

      .secure-badge i {
        color: #27ae60;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="login-card">

        <div class="logo">
          <i class="fas fa-landmark"></i>
        </div>

        <h1 class="bank-name">PRESTIGE TRUST</h1>
        <p class="tagline">Secure. Simple. Smart.</p>

        <div class="input-wrapper">
          <label class="input-label">Email Address</label>
          <i class="fas fa-envelope input-icon"></i>
          <input type="text" placeholder="Enter your email" class="input-field" id="email">
        </div>

        <div class="input-wrapper">
          <label class="input-label">Password</label>
          <i class="fas fa-lock input-icon"></i>
          <input type="password" placeholder="Enter your password" class="input-field" id="password">
        </div>

        <div class="forgot">
          <span>Forgot Password?</span>
        </div>

        <button class="login-btn" onclick="login()">
          SIGN IN
        </button>

        <div class="divider"><span>or continue with</span></div>

        <button class="biometric-btn">
          <i class="fas fa-fingerprint"></i> Biometric Login
        </button>

        <p class="signup">Don't have an account? <span class="signup-link">Sign Up</span></p>

        <div class="secure-badge">
          <i class="fas fa-shield-alt"></i>
          256-bit SSL Encrypted
        </div>

      </div>
    </div>

    <script>
      function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (email === "admin@prestigetrust.com" && password === "prestige123") {
          window.location.href = "dashboard.html";
        } else {
          alert("Invalid email or password. Please try again!");
        }
      }
    </script>

  </body>
</html>
